<!DOCTYPE html>
<html ng-app="studentApp">
<head>
    <title>Student Record System</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px #667eea;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .form-group {
            flex: 1;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .error {
            font-size: 12px;
            color: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #667eea;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #e6e6ff;
        }

        .highlight {
            background: #ffeaa7 !important;
        }

        .search {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>

<body ng-controller="studentController">

<div class="container">
    <h2>🎓 Student Record System</h2>

    <!-- FORM -->
    <div class="card">
        <form name="studentForm" ng-submit="addStudent(studentForm)" novalidate>

            <div class="row">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" ng-model="student.name"
                           required ng-pattern="/^[a-zA-Z ]+$/"
                           ng-change="nameChanged()" ng-blur="nameBlur()">
                    <span class="error" ng-show="studentForm.name.$touched && studentForm.name.$invalid">
                        Invalid Name
                    </span>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" ng-model="student.age"
                           min="18" max="60" required ng-blur="checkAge()">
                    <span class="error" ng-show="studentForm.age.$invalid">
                        Age 18–60 only
                    </span>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" ng-model="student.email"
                           required ng-change="emailTyping()">
                    <span class="error" ng-show="studentForm.email.$invalid">
                        Invalid Email
                    </span>
                </div>

                <div class="form-group">
                    <label>Course</label>
                    <select name="course" ng-model="student.course" required>
                        <option value="">Select</option>
                        <option>CS</option>
                        <option>IT</option>
                        <option>EXTC</option>
                    </select>
                    <span class="error" ng-show="studentForm.course.$invalid">
                        Required
                    </span>
                </div>
            </div>

            <button class="btn btn-primary" ng-disabled="studentForm.$invalid">
                Add Student
            </button>
        </form>
    </div>

    <!-- SEARCH -->
    <div class="card">
        <input class="search" type="text" ng-model="searchText" placeholder="🔍 Search students...">
    </div>

    <!-- TABLE -->
    <div class="card">
        <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Course</th>
                <th>Action</th>
            </tr>

            <tr ng-repeat="s in students | filter:searchText"
                ng-class="{'highlight': s.age > 40}">

                <td>{{s.name}}</td>
                <td>{{s.age}}</td>
                <td>{{s.email}}</td>
                <td>{{s.course}}</td>

                <td>
                    <button class="btn btn-danger" ng-click="deleteStudent($index)">
                        Delete
                    </button>
                </td>
            </tr>
        </table>
    </div>

</div>

<script>
var app = angular.module("studentApp", []);

app.controller("studentController", function($scope){

    $scope.students = [];
    $scope.student = {};

    // EVENTS
    $scope.nameChanged = function(){
        console.log("Typing name...");
    };

    $scope.nameBlur = function(){
        console.log("Left name field");
    };

    $scope.emailTyping = function(){
        console.log("Typing email...");
    };

    $scope.checkAge = function(){
        if($scope.student.age < 18){
            alert("Minimum age is 18");
        }
    };

    // ADD
    $scope.addStudent = function(form){
        if(form.$valid){
            $scope.students.push($scope.student);
            $scope.student = {};
            form.$setPristine();
            form.$setUntouched();
        }
    };

    // DELETE
    $scope.deleteStudent = function(index){
        $scope.students.splice(index,1);
    };

});
</script>

</body>
</html>
